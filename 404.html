<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | NovaPlay</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .error-code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent, #a78bfa), var(--accent2, #818cf8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 1rem;
            letter-spacing: -0.05em;
            filter: drop-shadow(0 0 60px rgba(167,139,250,0.35));
            animation: glitch404 3s infinite;
        }

        @keyframes glitch404 {
            0%, 90%, 100% { transform: translate(0); filter: drop-shadow(0 0 60px rgba(167,139,250,0.35)); }
            91% { transform: translate(-3px, 1px); filter: drop-shadow(3px 0 0 #f87171) drop-shadow(-3px 0 0 #818cf8); }
            92% { transform: translate(3px, -1px); filter: drop-shadow(-3px 0 0 #f87171) drop-shadow(3px 0 0 #818cf8); }
            93% { transform: translate(0); }
        }

        .error-title {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            color: var(--text, #e2e8f0);
            margin: 0 0 0.75rem;
        }

        .error-subtitle {
            color: var(--text-muted, rgba(200,200,230,0.5));
            font-size: 1rem;
            max-width: 420px;
            line-height: 1.7;
            margin: 0 0 2.5rem;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.75rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .error-btn-primary {
            background: linear-gradient(135deg, var(--accent, #a78bfa), var(--accent2, #818cf8));
            color: #fff;
            box-shadow: 0 4px 20px rgba(167,139,250,0.35);
        }

        .error-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(167,139,250,0.5);
        }

        .error-btn-secondary {
            background: rgba(255,255,255,0.06);
            color: var(--text, #e2e8f0);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .error-btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        .error-icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>

<body style="display:block;">
    <noscript>
        <div style="position:fixed;inset:0;z-index:2147483647;background:#050508;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:Inter,system-ui,sans-serif;padding:2rem;">
            <div style="font-size:4rem;margin-bottom:1.5rem">&#9888;&#65039;</div>
            <h2 style="font-size:2rem;font-weight:800;background:linear-gradient(135deg,#f87171,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0 0 1rem">JavaScript Required</h2>
            <p style="color:rgba(200,200,230,0.65);font-size:1rem;max-width:420px;line-height:1.7;margin:0 0 1.5rem">NovaPlay requires JavaScript to function.<br>Please enable it in your browser settings.</p>
            <div style="padding:10px 24px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);border-radius:10px;color:#fca5a5;font-size:0.85rem;font-weight:600">&#128295; Enable JavaScript and refresh the page</div>
            <p style="color:rgba(200,200,230,0.2);font-size:0.7rem;margin-top:2rem">&#169; 2026 NovaPlay</p>
        </div>
    </noscript>


    <div class="mouse-follower" id="mouseFollower"></div>
    <div class="floating-glow glow-1"></div>
    <div class="floating-glow glow-2"></div>

    <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-subtitle">Oops! This page doesn't exist or has been moved.</p>
        <div class="error-actions">
            <a href="/" class="error-btn error-btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Back to Home
            </a>
        </div>
    </div>

    <script src="protect.js"></script>
    <script src="script.js"></script>
</body>

</html>
